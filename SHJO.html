<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHJO Official Store</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:linear-gradient(135deg,#ff6f00,#ff9100);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}
.card{
    background:#fff;
    width:100%;
    max-width:420px;
    border-radius:24px;
    padding:35px 25px;
    box-shadow:0 15px 40px rgba(0,0,0,.18);
    text-align:center;
}
.logo{
    font-size:36px;
    font-weight:700;
    color:#000000;
    margin-bottom:10px;
}
.subtitle{
    color:#555;
    font-size:16px;
    margin-bottom:30px;
}
.btn{
    display:block;
    text-decoration:none;
    padding:18px;
    margin:12px 0;
    border-radius:16px;
    font-size:18px;
    font-weight:600;
    color:#fff;
    transition:.2s;
}
.nigeria{background:#ff6f00;}
.kenya{background:#00a651;}
.ghana{background:#ce1126;}
.uganda{background:#6a1b9a;}
.cote{background:#2e8b57;}
.senegal{background:#f4c430;}
.btn:hover{transform:translateY(-2px);}
.footer{
    margin-top:20px;
    font-size:12px;
    color:#999;
}
</style>
</head>
<body>
<div class="card">
    <div class="logo">SHJO</div>
    <div class="subtitle">Choose Your Country Store</div>

    <a class="btn nigeria" href="https://www.jumia.com.ng/shjo-flagship-shop/">🇳🇬 Nigeria</a>
    <a class="btn kenya" href="https://www.jumia.co.ke/shjo-flagship-shop/">🇰🇪 Kenya</a>
    <a class="btn ghana" href="https://www.jumia.com.gh/shjo-flagship-shop/">🇬🇭 Ghana</a>
    <a class="btn uganda" href="https://www.jumia.ug/shjo-flagship-shop/">🇺🇬 Uganda</a>
    <a class="btn cote" href="https://www.jumia.ci/shjo-flagship-shop/">🇨🇮 Côte d'Ivoire</a>
    <a class="btn senegal" href="https://www.jumia.sn/shjo-flagship-shop/">🇸🇳 Senegal</a>

    <div class="footer">Official SHJO Flagship Store</div>
</div>
</body>
</html>
